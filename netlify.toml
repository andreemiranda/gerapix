# =====================================================
# PIXFLOW — Configuração Netlify
# Documentação: https://docs.netlify.com/configure-builds/file-based-configuration/
# =====================================================

# ── Build padrão (produção) ──────────────────────────
[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION  = "10"

# ── Contexto: Deploy Previews (Pull Requests) ────────
[context.deploy-preview]
  command = "npm run build"

[context.deploy-preview.environment]
  VITE_APP_ENV  = "preview"
  VITE_APP_NAME = "GeraPix PREVIEW"
  # As variáveis VITE_FIREBASE_* são herdadas do ambiente configurado
  # no Netlify Dashboard em "Deploy Previews"

# ── Contexto: Branch develop → URL de desenvolvimento ─
[context.develop]
  command = "npm run build"

[context.develop.environment]
  VITE_APP_ENV  = "development"
  VITE_APP_NAME = "GeraPix DEV"

# ── Contexto: Branch main → Produção ─────────────────
[context.production]
  command = "npm run build"

[context.production.environment]
  VITE_APP_ENV  = "production"
  VITE_APP_NAME = "GeraPix"

# ── Redirecionamentos (SPA — React Router) ───────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers de segurança HTTP ────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options              = "DENY"
    X-XSS-Protection             = "1; mode=block"
    X-Content-Type-Options       = "nosniff"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy      = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://apis.google.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      connect-src 'self'
        https://*.googleapis.com
        https://*.firebaseio.com
        https://*.firebase.com
        https://firestore.googleapis.com
        https://identitytoolkit.googleapis.com
        wss://*.firebaseio.com;
      frame-src https://accounts.google.com;
    """

# ── Cache de assets estáticos ────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
